spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # Railway provides DATABASE_URL, convert to expected format
    url: ${DATABASE_URL:${DB_URL:jdbc:postgresql://localhost:5432/taskflow}}
    username: ${DB_USERNAME:${POSTGRES_USER:postgres}}
    password: ${DB_PASSWORD:${POSTGRES_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_TIMEOUT_MS:30000}
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: TaskFlowHikariPool
      data-source-properties:
        ssl: true
        sslmode: require

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.taskflow: INFO
    com.taskflow.ai: INFO
    org.springframework.security: WARN
    org.hibernate: WARN
