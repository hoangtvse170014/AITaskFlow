spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/taskflow}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      connection-timeout: ${DB_POOL_TIMEOUT_MS:30000}
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: TaskFlowHikariPool

  jpa:
    hibernate:
      # Use 'update' for Railway to auto-create tables if they don't exist
      # Once schema is stable, change to 'validate' for safety
      ddl-auto: ${DB_DDL_AUTO:update}
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          time_zone: UTC

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:3000}

logging:
  level:
    com.taskflow: INFO
    com.taskflow.ai: INFO
    org.springframework.security: WARN
    org.hibernate: WARN